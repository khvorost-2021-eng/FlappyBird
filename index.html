<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- МЕНЮ -->
    <div id="menuScreen" class="screen active">
        <div class="player-info">
            <img id="playerAvatar" class="player-avatar" src="" alt="" style="display:none;">
            <span id="playerName" class="player-name">Гость</span>
        </div>
        <div class="coin-display">
            <span class="coin-icon">🪙</span>
            <span id="coinCount">0</span>
        </div>
        <h1 class="game-title">Flappy Bird</h1>
        <canvas id="menuCanvas" width="300" height="200"></canvas>
        <div class="menu-buttons">
            <button id="playBtn" class="menu-btn primary">Играть</button>
            <button id="skinsBtn" class="menu-btn secondary">Скины</button>
            <button id="settingsBtn" class="menu-btn accent">⚙ Настройки</button>
            <button id="recordsBtn" class="menu-btn secondary">Рекорды</button>
        </div>
    </div>

    <!-- СКИНЫ -->
    <div id="skinsScreen" class="screen">
        <div class="screen-header">
            <button class="back-btn" data-target="menuScreen">← Назад</button>
            <div class="coin-display small">
                <span class="coin-icon">🪙</span>
                <span id="coinCountSkins">0</span>
            </div>
        </div>
        <h2 class="screen-title">Выберите скин</h2>
        <div id="skinsGrid"></div>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="screen game-screen">
        <canvas id="gameCanvas"></canvas>
        <button id="gameBackBtn" class="back-btn" style="position:absolute; top:20px; left:20px;">← Меню</button>
        <div class="coin-display small" style="position:absolute; top:20px; right:20px;">
            <span class="coin-icon">🪙</span>
            <span id="gameCoinCount">0</span>
        </div>
        <div id="score" style="position:absolute; top:20px; left:50%; transform:translateX(-50%);">0</div>
        <div id="tapHint">Нажмите для старта</div>
    </div>

    <!-- ЭКРАН СМЕРТИ -->
    <div id="deathScreen" class="screen">
        <h2 class="screen-title">Игра окончена</h2>
        <div id="finalStats">
            <div class="stat-row">
                <span>Счёт:</span>
                <strong id="finalScore">0</strong>
            </div>
            <div class="stat-row">
                <span>Заработано монет:</span>
                <strong id="earnedCoins">0</strong>
            </div>
            <div class="stat-row highlight">
                <span>Лучший результат:</span>
                <strong id="bestScore">0</strong>
            </div>
        </div>
        <div class="menu-buttons">
            <button id="restartBtn" class="menu-btn primary">Играть снова</button>
            <button id="menuBtn" class="menu-btn secondary">В меню</button>
        </div>
    </div>

    <!-- РЕКОРДЫ -->
    <div id="recordsScreen" class="screen">
        <div class="screen-header">
            <button class="back-btn" data-target="menuScreen">← Назад</button>
        </div>
        <h2 class="screen-title">Таблица рекордов</h2>
        <div id="leaderboard">
            <ul id="leaderboardList"></ul>
        </div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div id="settingsScreen" class="screen">
        <div class="screen-header">
            <button class="back-btn" data-target="menuScreen">← Назад</button>
        </div>
        <h2 class="screen-title">⚙ Настройки</h2>
        <div class="settings-container">
            <div class="settings-section">
                <h3 class="section-title">🎨 Тема оформления</h3>
                <div id="themesGrid" class="themes-grid"></div>
            </div>
            <div class="settings-section">
                <h3 class="section-title">🔊 Звук</h3>
                <div class="sound-control">
                    <div class="sound-label">
                        <span>🎵 Музыка</span>
                        <span id="musicValue" class="sound-value">70%</span>
                    </div>
                    <div class="slider-row">
                        <button id="musicToggle" class="mute-btn">🎵</button>
                        <input type="range" id="musicSlider" class="styled-slider" min="0" max="100" value="70">
                    </div>
                </div>
                <div class="sound-control">
                    <div class="sound-label">
                        <span>🔔 Эффекты</span>
                        <span id="sfxValue" class="sound-value">80%</span>
                    </div>
                    <div class="slider-row">
                        <button id="sfxToggle" class="mute-btn">🔔</button>
                        <input type="range" id="sfxSlider" class="styled-slider" min="0" max="100" value="80">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="app.js"></script>
</body>
</html>
